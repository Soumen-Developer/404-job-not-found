version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: cy_jobs_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cy_jobs_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cy_jobs_password}
      POSTGRES_DB: ${POSTGRES_DB:-cy_jobs}
    ports:
      - "5432:5432"
    volumes:
      - ../postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cy_jobs_user}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cy_jobs_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - ../redis/data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cy_jobs_minio
    restart: always
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ../minio/data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
