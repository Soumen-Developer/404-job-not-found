name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-build:
    name: Lint and Build Monorepo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @cy-jobs/backend exec prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/cyjobs?schema=public"

      - name: Run Linters
        run: pnpm run lint

      - name: Build Project
        run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
